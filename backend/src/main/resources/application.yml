server:
  port: 8080

spring:
  application:
    name: task-manager-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskmanager}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:c2VjcmV0LWtleS1wYXJhLWRlc2Vudm9sdmltZW50by10cm9xdWUtZW0tcHJvZHVjYW8tMTIzNDU2}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.taskmanager: INFO
